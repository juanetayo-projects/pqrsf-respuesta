<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso – Respuesta PQRSF · Clínica Santa Bárbara</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="login-body">

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="assets/logo-wide.png" alt="Clínica Santa Bárbara"
           onerror="this.src='assets/logo.png'" />
    </div>

    <div class="login-header">
      <div class="login-icon"><i class="fa-solid fa-reply-all"></i></div>
      <h1>Respuesta PQRSF</h1>
      <p>Ingrese sus credenciales para acceder al módulo de registro de respuestas</p>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)" autocomplete="on">

      <div class="login-field">
        <label for="loginEmail"><i class="fa-solid fa-envelope"></i> Correo electrónico</label>
        <input type="email" id="loginEmail"
               placeholder="usuario@cacsantabarbara.co"
               required autocomplete="username" />
      </div>

      <div class="login-field">
        <label for="loginPwd"><i class="fa-solid fa-lock"></i> Contraseña</label>
        <div class="pwd-wrap">
          <input type="password" id="loginPwd"
                 placeholder="••••••••"
                 required autocomplete="current-password" />
          <button type="button" class="pwd-toggle" onclick="togglePwd()" tabindex="-1">
            <i class="fa-solid fa-eye" id="pwdIcon"></i>
          </button>
        </div>
      </div>

      <div class="login-error" id="loginError" style="display:none"></div>

      <button type="submit" class="btn-login" id="btnLogin">
        <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
      </button>

    </form>

    <div class="login-footer-note">
      <i class="fa-solid fa-shield-halved"></i>
      Acceso restringido a personal autorizado de la institución
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
</body>
</html>
